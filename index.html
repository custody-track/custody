<!DOCTYPE html>
<html lang="ar"dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>CUSTODY (Firebase Secure)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
            background: url('https://g.top4top.io/p_3752xoq8n1.png') repeat;
  background-size: 300px 300px; /* 🔥 تصغير الصورة */ 
  

      direction: rtl; padding: 0px;  font-family: 'Cairo', sans-serif;
       height: 100vh;
width: 100vw;
margin: 0PX;
    }

    body::before {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;

  background: rgba(255, 255, 255, 0.8); /* شفافية */
  backdrop-filter: blur(0px);
  -webkit-backdrop-filter: blur(0px);

  z-index: -1;
}

    h2,h3,h4{text-align:center}
    input,button,select,textarea{width:100%;padding:12px;margin:6px 0;font-size:16px;box-sizing: border-box;font-family: 'Cairo', sans-serif;}
    button{background:#121586;color:#fff;border:none;border-radius:0px;cursor:pointer}
    .box{padding:12px;border-radius:8px;margin-bottom:15px;}
    textarea {
  resize: none; /* اختياري */
}
    .balance-box{margin-top:10px;padding:10px;background:#e9f5ff;text-align:center;font-size:18px;font-weight:bold;border-radius:6px}
.card {
  background: rgba(255, 255, 255, 0.7);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);

  border-radius: 16px;
  padding: 14px;
  margin-bottom: 12px;

  border: 1px solid rgba(255,255,255,0.3);
  box-shadow: 0 8px 20px rgba(0,0,0,0.1);
}
    .card-main{display:flex;justify-content:space-between;font-weight:bold;background:#f8f9fa;padding:8px;border-radius:8px}
    .green{color:green}.red{color:red}
    button.delete-btn {color: #a30000; padding: 0PX;width: 10%;}

        .spinner-container {
  text-align: center;
  margin-top: 20px;
  color: #444;
  font-weight: bold;
}

.spinner {
  margin: 0 auto 10px;
  width: 24px;
  height: 24px;
  border: 5px solid #ccc;
  border-top: 5px solid  #0d323b;
  border-radius: 50%;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  to {
    transform: rotate(360deg);
  }
}


.top-bar {
  display: flex;
  justify-content: space-between; /* يوزعهم يمين وشمال */
  align-items: center;

  background: #121586; 
  padding-right: 10px;
  padding-top: 0px;
padding-bottom: 0px0;
padding-left: 10px;

  color: #fff;

 /* margin-top: -25PX;
  margin-right: -10PX;
  margin-left: -10PX;*/
}

.top-bar h3 {
  margin: 0;
  margin-right: 20px;
}

.top-bar button {
  background: #121586; 
   width: 20%;
  min-width: 150px; /* يمنع إنه يصغر قوي */
  border: none;
  color: #fff;
  padding: 8px 12px;
  border-radius: 6px;
  cursor: pointer;
  
}



  </style>
</head>
<body>

<DIv >

 <div class="top-bar">
  <h3 id="empName"></h3>
  <button onclick="logout()">تسجيل خروج</button>
</div>

<div id="startBox" class="box">
  <h2>مرحبًا</h2>
  <button onclick="loginWithGoogle()">تسجيل الدخول بجيميل</button>
</div>

<div id="panel" class="box" style="display:none;">

 

    <div style="text-align:center; margin-bottom:15px;">
  <img id="logo" src="" alt="logo" 
       style="max-width:80px; border-radius:10px;width:20%; object-fit:cover;margin-bottom: 0PX;">
           <H6 style="margin-top: 2PX;font-family: Arial;">اَلأَمِينُ فِي الْقَلِيلِ أَمِينٌ أَيْضًا فِي الْكَثِيرِ، وَالظَّالِمُ فِي الْقَلِيلِ ظَالِمٌ أَيْضًا فِي الْكَثِيرِ</H6>
</div>

  <select id="type">
    <option value="add">إستلام عهدة</option>
    <option value="expense">مصروف</option>
  </select>

<select id="sector" onchange="loadChurches()">
  <option value="">اختر القطاع</option>
  <option value="قطاع شرق الأسكندرية">قطاع شرق الأسكندرية</option>
</select>

<select id="church" onchange="loadServants()">
  <option value="">اختر الكنيسة</option>
</select>

<select id="servant">
  <option value="">اختر الخادم</option>
</select>

  <input id="amount" type="number" placeholder="المبلغ">
  <input id="date" type="date">
  <textarea id="note" placeholder="ملاحظة"></textarea>

   <div id="loading" class="spinner-container" style="display: none;">
      <div class="spinner"></div>
      <p>جاري التحميل...</p>
    </div>

  <button id="saveBtn" onclick="saveTransaction()">حفظ</button>

  <div class="balance-box">الرصيد: <span id="balance">0</span></div>
  <div id="transactions"></div>
</div>



<div id="toast" style="
  position:fixed;
  top:50%;
  left:50%;
  transform:translateX(-50%);
  background:#333;
  color:#fff;
  padding:10px 20px;
  border-radius:15px;
  display:none;
  z-index:9999;
  box-shadow:0 4px 10px rgba(0,0,0,0.2);
"></div>

</DIv>


<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>


<script>

  const logoUrl = "https://copticorthodox.church/wp-content/uploads/elementor/thumbs/393663128_644369904552005_2948849629343684104_n-qe19js2ly06p1edroaw4higa70mgqlo7v2rprcuolc.jpg";

document.getElementById("logo").src = logoUrl;



const firebaseConfig = {
  apiKey: "AIzaSyAweoEcVjZXM43tqryvvmGU-zXff8gfdQ8",
  authDomain: "fady-odas.firebaseapp.com",
  databaseURL: "https://fady-odas-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

let currentEmpId = null;

const provider = new firebase.auth.GoogleAuthProvider();


const data = {
  "قطاع شرق الأسكندرية": {
    churches: {
      "كنيسة غربال": {
        servants: ["رانيا سامي", "ماجد سمير"]
      },
"كنيسة كوبري الناموس": {
        servants: ["مارتينا رزق", "سناء بشري"]
      }
    }
  }
};



function showToast(msg, color="#333") {
  const toast = document.getElementById("toast");
  toast.innerText = msg;
  toast.style.background = color;
  toast.style.display = "block";

  setTimeout(() => {
    toast.style.display = "none";
  }, 3000);
}

function loginWithGoogle() {
  auth.signInWithPopup(provider).then(res => {
    const user = res.user;
    currentEmpId = user.uid;

    document.getElementById("empName").innerText = user.displayName;

    document.getElementById("startBox").style.display = "none";
    document.getElementById("panel").style.display = "block";

    // حفظ بيانات المستخدم
    db.ref("employees/" + user.uid).update({
      name: user.displayName,
      email: user.email
    });

    loadTransactions();
  });
}

auth.onAuthStateChanged(user => {
  if (user) {
    currentEmpId = user.uid;

    document.getElementById("empName").innerText = user.displayName;

    document.getElementById("startBox").style.display = "none";
    document.getElementById("panel").style.display = "block";

    loadTransactions();
  } else {
    document.getElementById("startBox").style.display = "block";
    document.getElementById("panel").style.display = "none";
  }
});
window.onload = function () {



  
  const today = new Date();

  const year = today.getFullYear();
  const month = String(today.getMonth() + 1).padStart(2, '0');
  const day = String(today.getDate()).padStart(2, '0');

  const formattedDate = `${year}-${month}-${day}`;

  document.getElementById("date").value = formattedDate;
};

function saveTransaction() {
  showLoading();

  const type = document.getElementById("type").value;
  const amount = document.getElementById("amount").value;
  const date = document.getElementById("date").value;
  const note = document.getElementById("note").value;

  const sector = document.getElementById("sector").value;
  const church = document.getElementById("church").value;
  const servant = document.getElementById("servant").value;

  if (!amount) {
    hideLoading();
    showToast("من فضلك أدخل المبلغ", "red");
    return;
  }

  db.ref("employees/" + currentEmpId + "/transactions")
    .push({
      type,
      amount,
      date,
      note,
      sector,
      church,
      servant
    })
    .then(() => {
      hideLoading();

    document.getElementById("amount").value = "";
document.getElementById("note").value = "";

document.getElementById("date").value = new Date().toISOString().split('T')[0];


      loadTransactions();
showToast("تم الحفظ بنجاح ✅", "green");

    })
    .catch((error) => {
      hideLoading();
      console.error(error);

showToast("حدث خطأ ❌", "red");    });
}

function loadTransactions() {
  db.ref("employees/" + currentEmpId + "/transactions")
    .once("value", snap => {
const data = snap.val() || {};
      let html = "";
      let total = 0;

      for (let id in data) {
        const t = data[id];
        total += t.type === "add" ? +t.amount : -t.amount;


html += `
<div class="card">
  <div class="card-main">
    <div>${t.date}</div>
    <div class="${t.type === 'add' ? 'green':'red'}">
      ${t.type === 'add' ? 'إستلام عهدة':'مصروف'}
    </div>
    <div>${t.amount}</div>
  </div>

  <div>${t.note || ''}</div>

  <div style="margin-top:6px; font-size:14px; color:#555;">
    القطاع: ${t.sector || '-'} <br>
    الكنيسة: ${t.church || '-'} <br>
    الخادم: ${t.servant || '-'}
  </div>

  <button  onclick="deleteTransaction('${id}')" 
    style="color: #a30000;background: none; padding: 0PX;width: 10%; padding: 0PX; margin-top:8px;">
    حذف
  </button>
</div>`;


      }

      document.getElementById("transactions").innerHTML = html;
      document.getElementById("balance").innerText = total;
    });
}


function logout() {
  auth.signOut().then(() => {
    currentEmpId = null;
  });
}

function loadServants() {
  const sector = document.getElementById("sector").value;
  const church = document.getElementById("church").value;
  const servantSelect = document.getElementById("servant");

  // reset
  servantSelect.innerHTML = '<option value="">اختر الخادم</option>';

  if (!sector || !church) return;

  const servants = data[sector]?.churches[church]?.servants || [];

  servants.forEach(name => {
    const option = document.createElement("option");
    option.value = name;
    option.textContent = name;
    servantSelect.appendChild(option);
  });
}


function loadChurches() {
  const sector = document.getElementById("sector").value;
  const churchSelect = document.getElementById("church");
  const servantSelect = document.getElementById("servant");

  // reset
  churchSelect.innerHTML = '<option value="">اختر الكنيسة</option>';
  servantSelect.innerHTML = '<option value="">اختر الخادم</option>';

  if (!sector || !data[sector]) return;

  const churches = data[sector].churches;

  for (let churchName in churches) {
    const option = document.createElement("option");
    option.value = churchName;
    option.textContent = churchName;
    churchSelect.appendChild(option);
  }
}


function deleteTransaction(id) {
  if (!confirm("هل أنت متأكد من حذف المعاملة؟")) return;

  db.ref("employees/" + currentEmpId + "/transactions/" + id)
    .remove()
    .then(() => {
      loadTransactions();
    });
}



    function showLoading() {
  document.getElementById("loading").style.display = "block";

    const btn = document.getElementById("saveBtn");
  btn.disabled = true;
  btn.style.opacity = "0.6";
  btn.style.cursor = "not-allowed";
  btn.textContent = "جاري الحفظ...";
}

function hideLoading() {
  document.getElementById("loading").style.display = "none";
   const btn = document.getElementById("saveBtn");
  btn.disabled = false;
  btn.style.opacity = "1";
  btn.style.cursor = "pointer";
  btn.textContent = "حفظ العملية";
}

</script>

</body>
</html>
