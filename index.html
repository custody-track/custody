<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>CUSTODY</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {font-family: Arial; direction: rtl; padding: 10px; background: #f9f9f9;}
    h2,h3{text-align:center}
    input,button,select,textarea{width:100%;padding:12px;margin:6px 0;font-size:16px}
    button{background:#007bff;color:#fff;border:none;border-radius:6px;cursor:pointer}
    .box{background:#fff;padding:12px;border-radius:8px;box-shadow:0 0 8px rgba(0,0,0,.1);margin-bottom:15px}
    .balance-box{margin-top:10px;padding:10px;background:#e9f5ff;text-align:center;font-size:18px;font-weight:bold;border-radius:6px}
    .card{background:#fff;border-radius:12px;padding:12px;margin-bottom:12px;box-shadow:0 4px 10px rgba(0,0,0,0.08)}
    .card-main{display:flex;justify-content:space-between;font-weight:bold;background:#f8f9fa;padding:8px;border-radius:8px}
    .green{color:green}.red{color:red}
  </style>
</head>
<body>

<!-- شاشة البداية -->
<div id="startBox" class="box">
  <h2>مرحبًا</h2>
  <button onclick="loginWithGoogle()">تسجيل الدخول بجيميل</button>
</div>

<!-- لوحة المستخدم -->
<div id="panel" class="box" style="display:none;">
  <h3 id="empName"></h3>

  <button onclick="logout()" style="background:#dc3545">تسجيل خروج</button>

  <select id="type">
    <option value="add">إضافة</option>
    <option value="expense">مصروف</option>
  </select>

  <input id="amount" type="number" placeholder="المبلغ">
  <input id="date" type="date">
  <textarea id="note" placeholder="ملاحظة"></textarea>

  <button onclick="saveTransaction()">حفظ</button>

  <div class="balance-box">
    الرصيد: <span id="balance">0</span>
  </div>

  <div id="transactions"></div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAweoEcVjZXM43tqryvvmGU-zXff8gfdQ8",
  authDomain: "fady-odas.firebaseapp.com",
  databaseURL: "https://fady-odas-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();
const provider = new firebase.auth.GoogleAuthProvider();

let currentEmpId = null;

// 🔥 تسجيل الدخول (Redirect)
function loginWithGoogle() {
  auth.signInWithRedirect(provider);
}

// 🔥 بعد الرجوع من جوجل
auth.getRedirectResult().then(result => {
  if (result.user) {
    setupUser(result.user);
  }
});

// 🔥 لو المستخدم بالفعل مسجل قبل كده
auth.onAuthStateChanged(user => {
  if (user) {
    setupUser(user);
  }
});

function setupUser(user) {
  currentEmpId = user.uid;

  document.getElementById("empName").innerText = "المستخدم: " + user.displayName;

  document.getElementById("startBox").style.display = "none";
  document.getElementById("panel").style.display = "block";

  // حفظ بيانات المستخدم
  db.ref("employees/" + user.uid).update({
    name: user.displayName,
    email: user.email
  });

  loadTransactions();
}

// 🔥 تسجيل خروج
function logout() {
  auth.signOut().then(() => location.reload());
}

// 🔥 حفظ عملية
function saveTransaction() {
  const type = document.getElementById("type").value;
  const amount = document.getElementById("amount").value;
  const date = document.getElementById("date").value;
  const note = document.getElementById("note").value;

  if (!amount) return alert("ادخل المبلغ");

  db.ref("employees/" + currentEmpId + "/transactions").push({
    type, amount, date, note
  }).then(() => {
    document.getElementById("amount").value = "";
    document.getElementById("note").value = "";
    loadTransactions();
  });
}

// 🔥 تحميل العمليات
function loadTransactions() {
  db.ref("employees/" + currentEmpId + "/transactions")
    .once("value", snap => {

      const data = snap.val();
      let html = "";
      let total = 0;

      if (data) {
        Object.entries(data).forEach(([id, t]) => {
          total += t.type === "add" ? +t.amount : -t.amount;

          html += `
          <div class="card">
            <div class="card-main">
              <div>${t.date || ''}</div>
              <div class="${t.type === 'add' ? 'green':'red'}">
                ${t.type === 'add' ? 'إضافة':'مصروف'}
              </div>
              <div>${t.amount}</div>
            </div>
            <div>${t.note || ''}</div>
          </div>`;
        });
      }

      document.getElementById("transactions").innerHTML = html;
      document.getElementById("balance").innerText = total;
    });
}
</script>

</body>
</html>
