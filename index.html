<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>CUSTODY (Firebase Secure)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {font-family: Arial; direction: rtl; padding: 10px; background: #f9f9f9;}
    h2,h3,h4{text-align:center}
    input,button,select,textarea{width:100%;padding:12px;margin:6px 0;font-size:16px}
    button{background:#007bff;color:#fff;border:none;border-radius:6px;cursor:pointer}
    .box{background:#fff;padding:12px;border-radius:8px;box-shadow:0 0 8px rgba(0,0,0,.1);margin-bottom:15px}
    .balance-box{margin-top:10px;padding:10px;background:#e9f5ff;text-align:center;font-size:18px;font-weight:bold;border-radius:6px}
    .card{background:#fff;border-radius:12px;padding:12px;margin-bottom:12px;box-shadow:0 4px 10px rgba(0,0,0,0.08)}
    .card-main{display:flex;justify-content:space-between;font-weight:bold;background:#f8f9fa;padding:8px;border-radius:8px}
    .green{color:green}.red{color:red}
  </style>
</head>
<body>

<div id="startBox" class="box">
  <h2>مرحبًا</h2>
  <button onclick="loginWithGoogle()">تسجيل الدخول بجيميل</button>
</div>

<div id="panel" class="box" style="display:none;">
  <h3 id="empName"></h3>
<button onclick="logout()" style="background:#dc3545">تسجيل خروج</button>
  <select id="type">
    <option value="add">إستلام عهدة</option>
    <option value="expense">مصروف</option>
  </select>

<select id="sector" onchange="loadChurches()">
  <option value="">اختر القطاع</option>
  <option value="قطاع شرق">قطاع شرق</option>
</select>

<select id="church" onchange="loadServants()">
  <option value="">اختر الكنيسة</option>
</select>

<select id="servant">
  <option value="">اختر الخادم</option>
</select>

  <input id="amount" type="number" placeholder="المبلغ">
  <input id="date" type="date">
  <textarea id="note" placeholder="ملاحظة"></textarea>

  <button onclick="saveTransaction()">حفظ</button>

  <div class="balance-box">الرصيد: <span id="balance">0</span></div>
  <div id="transactions"></div>
</div>




<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>


<script>
const firebaseConfig = {
  apiKey: "AIzaSyAweoEcVjZXM43tqryvvmGU-zXff8gfdQ8",
  authDomain: "fady-odas.firebaseapp.com",
  databaseURL: "https://fady-odas-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

let currentEmpId = null;

const provider = new firebase.auth.GoogleAuthProvider();


const data = {
  "قطاع شرق": {
    churches: {
      "كنيسة العذراء": {
        servants: ["جرجس", "بيشوي"]
      }
    },
    churches: {
      "كنيسة العذراء": {
        servants: ["جرجس", "بيشوي"]
      }
    }
  }
};

function loginWithGoogle() {
  auth.signInWithPopup(provider).then(res => {
    const user = res.user;
    currentEmpId = user.uid;

    document.getElementById("empName").innerText = user.displayName;

    document.getElementById("startBox").style.display = "none";
    document.getElementById("panel").style.display = "block";

    // حفظ بيانات المستخدم
    db.ref("employees/" + user.uid).update({
      name: user.displayName,
      email: user.email
    });

    loadTransactions();
  });
}

auth.onAuthStateChanged(user => {
  if (user) {
    currentEmpId = user.uid;

    document.getElementById("empName").innerText = user.displayName;

    document.getElementById("startBox").style.display = "none";
    document.getElementById("panel").style.display = "block";

    loadTransactions();
  } else {
    document.getElementById("startBox").style.display = "block";
    document.getElementById("panel").style.display = "none";
  }
});

window.onload = function () {
  const today = new Date();

  const year = today.getFullYear();
  const month = String(today.getMonth() + 1).padStart(2, '0');
  const day = String(today.getDate()).padStart(2, '0');

  const formattedDate = `${year}-${month}-${day}`;

  document.getElementById("date").value = formattedDate;
};

function saveTransaction() {
  const type = document.getElementById("type").value;
  const amount = document.getElementById("amount").value;
  const date = document.getElementById("date").value;
  const note = document.getElementById("note").value;

  const sector = document.getElementById("sector").value;
  const church = document.getElementById("church").value;
  const servant = document.getElementById("servant").value;

  if (!amount) return;

  db.ref("employees/" + currentEmpId + "/transactions").push({
    type,
    amount,
    date,
    note,
    sector,
    church,
    servant
  }).then(loadTransactions);
}

document.getElementById("date").value = new Date().toISOString().split('T')[0];

function loadTransactions() {
  db.ref("employees/" + currentEmpId + "/transactions")
    .once("value", snap => {
const data = snap.val() || {};
      let html = "";
      let total = 0;

      for (let id in data) {
        const t = data[id];
        total += t.type === "add" ? +t.amount : -t.amount;
html += `
<div class="card">
  <div class="card-main">
    <div>${t.date}</div>
    <div class="${t.type === 'add' ? 'green':'red'}">
      ${t.type === 'add' ? 'إضافة':'مصروف'}
    </div>
    <div>${t.amount}</div>
  </div>

  <div>${t.note || ''}</div>

  <div style="margin-top:6px; font-size:14px; color:#555;">
    القطاع: ${t.sector || '-'} <br>
    الكنيسة: ${t.church || '-'} <br>
    الخادم: ${t.servant || '-'}
  </div>
</div>`;


      }

      document.getElementById("transactions").innerHTML = html;
      document.getElementById("balance").innerText = total;
    });
}


function logout() {
  auth.signOut().then(() => {
    currentEmpId = null;
  });
}

function loadServants() {
  const sector = document.getElementById("sector").value;
  const church = document.getElementById("church").value;
  const servantSelect = document.getElementById("servant");

  // reset
  servantSelect.innerHTML = '<option value="">اختر الخادم</option>';

  if (!sector || !church) return;

  const servants = data[sector]?.churches[church]?.servants || [];

  servants.forEach(name => {
    const option = document.createElement("option");
    option.value = name;
    option.textContent = name;
    servantSelect.appendChild(option);
  });
}


function loadChurches() {
  const sector = document.getElementById("sector").value;
  const churchSelect = document.getElementById("church");
  const servantSelect = document.getElementById("servant");

  // reset
  churchSelect.innerHTML = '<option value="">اختر الكنيسة</option>';
  servantSelect.innerHTML = '<option value="">اختر الخادم</option>';

  if (!sector || !data[sector]) return;

  const churches = data[sector].churches;

  for (let churchName in churches) {
    const option = document.createElement("option");
    option.value = churchName;
    option.textContent = churchName;
    churchSelect.appendChild(option);
  }
}

</script>

</body>
</html>
